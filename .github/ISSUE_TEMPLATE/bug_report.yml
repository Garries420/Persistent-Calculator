name: Bug report
description: Report a reproducible problem in the latest release.
title: "[Bug] "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Shown in the hamburger menu.
      placeholder: 1.0.0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Do not attach history or screenshots containing personal information.
      placeholder: Tell us exactly what you entered or clicked.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
