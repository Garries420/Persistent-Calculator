name: Feature request
description: Suggest an improvement or a possible future calculator mode.
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: request
    attributes:
      label: What would you like added?
      description: Persistent Calculator currently focuses on Standard mode only.
    validations:
      required: true
  - type: textarea
    id: use
    attributes:
      label: How would you use it?
      description: Real use cases help prioritize future feedback-driven features.
    validations:
      required: true
