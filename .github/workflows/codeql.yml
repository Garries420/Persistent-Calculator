name: CodeQL security analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '31 4 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    if: github.repository == 'Garries420/Persistent-Calculator'
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual

      - name: Build analyzed executable
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installation = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installation) { throw "Visual Studio C++ tools were not found." }
          $devShell = Join-Path $installation "Common7\Tools\VsDevCmd.bat"
          $codeql = Join-Path $env:CODEQL_DIST "codeql.exe"
          $buildWrapper = Join-Path $env:RUNNER_TEMP "persistent-calculator-codeql-build.cmd"
          @(
            "@echo off"
            "call `"$devShell`" -arch=x64"
            "if errorlevel 1 exit /b 1"
            "call scripts\build-release.cmd"
          ) | Set-Content -LiteralPath $buildWrapper -Encoding ascii
          & $codeql database trace-command --working-dir="$PWD" -- $env:CODEQL_EXTRACTOR_CPP_WIP_DATABASE $env:ComSpec /d /c $buildWrapper
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - uses: github/codeql-action/analyze@v4
